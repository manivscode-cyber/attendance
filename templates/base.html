<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}{{ page_title or 'GoDigital Smart Attendance' }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_asset_url('css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-backdrop" aria-hidden="true"></div>
    {% include 'includes/header.html' %}
    <main class="site-main">
        {% include 'includes/flash-messages.html' %}
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/footer.html' %}
    {% block extra_scripts %}{% endblock %}
    <script src="{{ static_asset_url('js/app.js') }}"></script>
</body>
</html>
